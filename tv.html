<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNO TV</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: url('/bg.png') center center / cover no-repeat fixed;
      color: white;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    h1 {
      font-size: 72px;
      letter-spacing: 16px;
      text-shadow: 0 0 40px #c084fc, 0 4px 16px #000;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #c4b5fd;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .glass {
      background: rgba(20, 10, 60, 0.6);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 24px;
    }
    .main-layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      width: 100%;
      max-width: 1100px;
    }
    .top-card-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-width: 160px;
    }
    .section-label {
      font-size: 12px;
      color: #c4b5fd;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #top-card {
      width: 140px;
      height: 196px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      color: #333;
      border: 3px solid rgba(255,255,255,0.3);
      background-size: cover;
      background-position: center;
      text-shadow: 0 1px 4px rgba(255,255,255,0.8);
    }
    .players-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .player-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      border-radius: 20px;
      background: rgba(20, 10, 60, 0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .player-card.active {
      background: rgba(168, 85, 247, 0.25);
      border-color: #a855f7;
      box-shadow: 0 0 24px rgba(168,85,247,0.3);
    }
    .player-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .player-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(168,85,247,0.3);
      border: 2px solid rgba(168,85,247,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
    }
    .player-name {
      font-size: 30px;
      font-weight: bold;
    }
    .player-status {
      font-size: 13px;
      color: #9d8fd4;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .player-card.active .player-status {
      color: #c084fc;
    }
    .player-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .card-count {
      font-size: 52px;
      font-weight: bold;
      line-height: 1;
    }
    .card-count-label {
      font-size: 12px;
      color: #9d8fd4;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .uno-badge {
      background: #ef4444;
      color: white;
      font-size: 14px;
      font-weight: bold;
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 2px;
      animation: pulse 0.8s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    #turn-banner {
      text-align: center;
      font-size: 26px;
      padding: 14px;
      margin-bottom: 24px;
      border-radius: 20px;
      background: rgba(168,85,247,0.2);
      border: 1px solid rgba(168,85,247,0.4);
      letter-spacing: 2px;
      width: 100%;
      max-width: 1100px;
    }
    #waiting-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 40px;
      padding: 40px;
    }
    .waiting-text {
      font-size: 28px;
      color: #c4b5fd;
      letter-spacing: 3px;
    }
    .join-hint {
      font-size: 16px;
      color: #6b5fa0;
      margin-top: 8px;
    }
    #game-screen { display: none; width: 100%; max-width: 1100px; }

    /* Floating emotes */
    .floating-emote {
      position: fixed;
      bottom: -120px;
      width: 100px;
      height: 100px;
      border-radius: 16px;
      background-size: cover;
      background-position: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      z-index: 200;
      animation: floatUp 4s ease-in forwards;
    }
    .emote-name-tag {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      background: rgba(0,0,0,0.6);
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }
    @keyframes floatUp {
      0% { bottom: -120px; opacity: 0; transform: translateX(0) rotate(0deg); }
      10% { opacity: 1; }
      50% { transform: translateX(30px) rotate(8deg); }
      80% { opacity: 1; }
      100% { bottom: 110%; opacity: 0; transform: translateX(-20px) rotate(-6deg); }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      top: -20px;
      width: 12px;
      height: 12px;
      z-index: 300;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { top: -20px; opacity: 1; transform: rotate(0deg); }
      100% { top: 110%; opacity: 0.8; transform: rotate(720deg); }
    }
    #win-banner {
      display: none;
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      text-align: center;
      z-index: 400;
      text-shadow: 0 0 40px #c084fc, 0 4px 20px #000;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <h1>UNO</h1>
  <p class="subtitle">Game Board</p>

  <div id="waiting-screen" class="glass">
    <p class="waiting-text">Waiting for players to join...</p>
    <p class="join-hint">Open <strong>localhost:3000</strong> on each phone</p>
  </div>

  <div id="game-screen">
    <div id="turn-banner">⏳ Waiting...</div>
    <div class="main-layout">
      <div class="top-card-section glass">
        <p class="section-label">Top Card</p>
        <div id="top-card">--</div>
      </div>
      <div class="players-section" id="players-list"></div>
    </div>
  </div>

  <div id="win-banner"></div>

  <script>
    var socket = io();
    var imgMap = { R: "red1.webp", G: "green1.webp", B: "blue1.webp", Y: "yellow1.webp", W: "purple2.webp" };

    socket.emit("tv_join");

    socket.on("game_state", function(state) {
      if (!state.playerNames || state.playerNames.length === 0) return;

      document.getElementById("waiting-screen").style.display = "none";
      document.getElementById("game-screen").style.display = "block";

      var tc = state.topCard;
      var topEl = document.getElementById("top-card");
      if (tc) {
        topEl.textContent = tc.name;
        topEl.style.backgroundImage = "url('/" + (imgMap[tc.color] || "purple2.webp") + "')";
      }

      document.getElementById("turn-banner").textContent = "🎮 " + (state.currentPlayerName || "?") + "'s Turn";

      var listEl = document.getElementById("players-list");
      listEl.innerHTML = "";
      state.playerNames.forEach(function(name, i) {
        var isActive = state.playerIds[i] === state.currentPlayerId;
        var cardCount = state.cardCounts ? state.cardCounts[i] : "?";
        var initial = name ? name[0].toUpperCase() : "?";

        var div = document.createElement("div");
        div.className = "player-card glass" + (isActive ? " active" : "");
        div.innerHTML =
          '<div class="player-left">' +
            '<div class="player-avatar">' + initial + '</div>' +
            '<div>' +
              '<div class="player-name">' + name + '</div>' +
              '<div class="player-status">' + (isActive ? "🟣 Their turn!" : "Waiting...") + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="player-right">' +
            '<div class="card-count">' + cardCount + '</div>' +
            '<div class="card-count-label">cards</div>' +
            (cardCount == 1 ? '<div class="uno-badge">UNO!</div>' : '') +
          '</div>';
        listEl.appendChild(div);
      });
    });

    // Floating emote
    socket.on("show_emote", function(data) {
      var emote = document.createElement("div");
      emote.className = "floating-emote";
      emote.style.backgroundImage = "url('/" + data.emote + "')";
      var startX = 10 + Math.random() * 70;
      emote.style.left = startX + "%";

      var tag = document.createElement("div");
      tag.className = "emote-name-tag";
      tag.textContent = data.name;
      emote.appendChild(tag);

      document.body.appendChild(emote);
      setTimeout(function() {
        emote.remove();
      }, 4000);
    });

    // Win celebration
    socket.on("game_over", function(msg) {
      document.getElementById("turn-banner").textContent = "🎉 " + msg;

      var banner = document.getElementById("win-banner");
      banner.textContent = "🎉 " + msg + " 🎉";
      banner.style.display = "block";

      var colors = ["#a855f7", "#ef4444", "#22c55e", "#3b82f6", "#eab308", "#ec4899"];
      for (var i = 0; i < 120; i++) {
        (function() {
          var piece = document.createElement("div");
          piece.className = "confetti-piece";
          piece.style.left = Math.random() * 100 + "%";
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDuration = (2 + Math.random() * 2) + "s";
          piece.style.animationDelay = (Math.random() * 1.5) + "s";
          piece.style.width = piece.style.height = (8 + Math.random() * 8) + "px";
          if (Math.random() > 0.5) piece.style.borderRadius = "50%";
          document.body.appendChild(piece);
          setTimeout(function() { piece.remove(); }, 5000);
        })();
      }

      setTimeout(function() {
        banner.style.display = "none";
      }, 6000);
    });
  </script>
</body>
</html>
